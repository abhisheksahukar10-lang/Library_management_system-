# =============================================
# Library Management System - Config
# =============================================

spring.datasource.url=jdbc:postgresql://localhost:5432/library_db
spring.datasource.username=postgres
spring.datasource.password=postgres#123
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate — update keeps existing tables, creates missing ones
spring.jpa.hibernate.ddl-auto=create
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ✅ Show every SQL statement in the console
spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.library=INFO

server.port=8081
spring.application.name=library-management

# Disable open-in-view to prevent Spring Boot console WARNING
# LAZY loading still works inside @Transactional service methods
spring.jpa.open-in-view=false
